<!DOCTYPE html>
<html>
<head>
  <title>juzo34's world</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito&display=swap" rel="stylesheet">

  <style>
    /* Fond GIF full screen */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Nunito', sans-serif;
      color: white;
      text-align: center;

      /* Fond GIF */
      background: url('56C4F075-A776-4EFC-BA9E-AC5645A53846.gif') no-repeat center center fixed;
      background-size: cover;
    }

    /* Pour que le texte soit au-dessus du GIF */
    h1, p {
      position: relative;
      z-index: 1;
    }

    /* Optionnel : ajouter un léger overlay sombre pour mieux voir le texte */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3); /* ajuste l’opacité si nécessaire */
      z-index: 0;
    }

    
    /* --- AJOUTÉ : uniformiser toutes les images/GIFs et containers --- */

    /* Container horizontal pour aligner les éléments */
    .container {
      display: flex;
      justify-content: space-around; /* espace entre les éléments */
      flex-wrap: wrap; /* passe à la ligne si trop d’éléments */
      margin: 20px 0;
      position: relative;
      z-index: 1; /* au-dessus du fond */
    }

    /* Toutes les images et GIFs dans les containers */
    .container img {
      width: 250px;       /* largeur uniforme */
      height: 250px;      /* hauteur uniforme */
      object-fit: cover;  /* recadre sans déformer */
      margin: 10px;
      border-radius: 10px; /* optionnel, coins arrondis */
    }

    /* Texte dans container */
    .text-box {
      width: 250px;       /* même largeur que les images pour alignement */
      margin: 10px;
      text-align: left;
    }

    /* Pour le GIF en haut de page (avant les containers) */
    img[src="55C3BD8C-923F-4E1C-9657-C8CCE4B0809C.gif"]:first-of-type {
      width: 250px;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
      margin: 20px auto;
      display: block;
      position: relative;
      z-index: 1;
    }
  </style>

</head>

<body>
  
  <h1> 愛 JUZO 愛 </h1>
  
  <p> " t'sais tes mots j'men suis rappelé, ça ma laissé des balafres " <br> - 34murphy </p>

  <img src="55C3BD8C-923F-4E1C-9657-C8CCE4B0809C.gif">

<!-- Ligne 1 : GIF à droite, image à gauche -->
  <div class="container">
    <img src="IMG_7134.jpeg" alt="image gauche">
    <img src="55C3BD8C-923F-4E1C-9657-C8CCE4B0809C.gif" alt="GIF droite">
  </div>

  <!-- Ligne 2 : photo à gauche + photo au centre + texte à droite -->
  <div class="container">
    <img src="IMG_7131.jpeg" alt="photo gauche">
    <img src="IMG_7135.jpeg" alt="photo centre">
    <div class="text-box">
      <p>a 13 ans j'rêvais d'être pas né</p>
    </div>
  </div>
  
</body>
</html>
